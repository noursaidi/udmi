name: UDMI Integration Suite

on:
  push:
    branches:
      - '**'
jobs:
  images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 5
    env:
      PUSH_REGISTRY: ghcr.io
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Log in to the github registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.PUSH_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build binary
        run: |
          misc/discoverynode/bin/build_binary || true
      - name: build docker
        run: |
          cat <<EOF > Dockerfile.scratch
          FROM scratch
          COPY misc/discoverynode/dist/discoverynode discoverynode
          EOF
          cat Dockerfile.scratch
          docker build --no-cache -t ghrc.io/noursaidi/discverynode:$REF_NAME -f Dockerfile.scratch .
      - name: push docker
        run: |
          docker push ghrc.io/noursaidi/discverynode:$REF_NAME    
        
